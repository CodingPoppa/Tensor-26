name: DevSecOps Scanner

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }} > diff.txt

      - name: Run vulnerability scan
        run: |
          # 1. Create a safe JSON payload using jq (handles newlines/quotes)
          jq -n --arg d "$(cat diff.txt)" --arg l "python" \
            '{diff: $d, language: $l}' > payload.json

          # 2. POST the file content to your ngrok URL
          RESPONSE=$(curl -s -X POST https://idiocy-circulate-erasure.ngrok-free.dev/api/scan \
            -H "Content-Type: application/json" \
            -d @payload.json)

          # 3. Save response for the next steps
          echo "$RESPONSE" > result.json
          echo "===== SCAN RESULT ====="
          cat result.json

      - name: Post PR comment
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('result.json', 'utf8'));

            let comment = "## 🛡️ AI Security Scan Report\n\n";

            if (!result.findings || result.findings.length === 0) {
              comment += "✅ No vulnerabilities found! Code looks secure.\n";
            } else {
              comment += `⚠️ **${result.findings.length} Vulnerabilities Detected**\n\n`;
              result.findings.forEach((v, i) => {
                comment += `### ${i + 1}. ${v.owasp_category}\n`;
                comment += `- **Severity:** ${v.severity}\n`;
                comment += `- **Issue:** ${v.explanation}\n`;
                comment += `\n**Recommended Fix:**\n\`\`\`python\n${v.fix_after}\n\`\`\`\n\n---\n`;
              });
            }

            comment += `\n⏱️ Scan Time: ${result.scan_time_ms}ms | Decision: **${result.decision}**`;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: comment
            });

      - name: Fail if vulnerabilities detected
        run: |
          if grep -q '"decision":"FAIL"' result.json; then
            echo "❌ Critical vulnerabilities found. Blocking PR merge."
            exit 1
          fi
