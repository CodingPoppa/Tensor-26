name: DevSecOps Scanner

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get git diff
        run: |
          git fetch origin main
          git diff origin/main > diff.txt

      - name: Show diff (for testing)
        run: |
          echo "===== DIFF START ====="
          cat diff.txt
          echo "===== DIFF END ====="
